
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spray Aqua Resort | Premium Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
      
      :root {
        --resort-navy: #0f172a;
        --resort-blue: #0284c7;
        --resort-slate: #334155;
      }

      body { 
        font-family: 'Plus Jakarta Sans', sans-serif; 
        color: #1e293b; 
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
        margin: 0;
        display: flex;
        flex-direction: column;
      }

      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: linear-gradient(rgba(15, 23, 42, 0.5), rgba(15, 23, 42, 0.5)), url('https://images.unsplash.com/photo-1540206351-d6465b3ac5c1?auto=format&fit=crop&q=80&w=2000');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        z-index: -1;
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(20px) saturate(160%);
        -webkit-backdrop-filter: blur(20px) saturate(160%);
        border: 1px solid rgba(255, 255, 255, 0.4);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      }

      .glass-header {
        background: rgba(15, 23, 42, 0.2);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      .input-premium {
        background: rgba(255, 255, 255, 0.95);
        border: 1px solid #94a3b8;
        border-radius: 12px;
        padding: 14px 20px;
        transition: all 0.15s ease;
        outline: none;
        width: 100%;
        font-weight: 500;
        color: #0f172a;
      }

      .input-premium:focus {
        border-color: var(--resort-blue);
        box-shadow: 0 0 0 4px rgba(2, 132, 199, 0.1);
      }

      .btn-resort {
        background: var(--resort-navy);
        color: white;
        border-radius: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        transition: all 0.2s ease-out;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 18px 32px;
      }

      .btn-resort:hover {
        background: #1e293b;
        transform: translateY(-1px);
        box-shadow: 0 10px 15px -3px rgba(15, 23, 42, 0.2);
      }

      @keyframes slideUp {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
      }
      
      .animate-slide-up {
        animation: slideUp 0.3s ease-out forwards;
      }

      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        75% { transform: translateX(5px); }
      }

      .animate-shake {
        animation: shake 0.2s ease-in-out infinite;
      }
      
      .custom-scrollbar::-webkit-scrollbar { width: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

      /* QR Scanner Overrides */
      #reader__scan_region {
        background: #000 !important;
        border-radius: 20px;
        overflow: hidden;
      }
      #reader__dashboard_section_csr button {
        background: #1e293b !important;
        color: white !important;
        border-radius: 8px !important;
        padding: 8px 16px !important;
        font-size: 10px !important;
        font-weight: 900 !important;
        text-transform: uppercase !important;
        border: none !important;
      }
    </style>
<script type="importmap">
{

  }
}
</script>
</head>

    <div id="root"></div>

</body>
</html>
